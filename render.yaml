services:
  - type: web
    name: brainwhisper-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BRAINWHISPER_CORS_ORIGINS
        sync: false
      - key: BRAINWHISPER_JWT_SECRET
        generateValue: true
    disk:
      name: brainwhisper-data
      mountPath: /app/data
      sizeGB: 1

  - type: web
    name: brainwhisper-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        fromService:
          name: brainwhisper-backend
          type: web
          property: host
